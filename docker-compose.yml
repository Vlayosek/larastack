services:
  # Backend Laravel (API)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: larastack-app
    container_name: larastack_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - db
      - redis
    networks:
      - larastack-network

  # Servidor Web (Nginx - Backend API)
  web:
    image: nginx:alpine
    container_name: larastack_web
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - larastack-network

  # Frontend (Vue 3 Dev Server)
  frontend:
    image: node:22-alpine
    container_name: larastack_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - app
    networks:
      - larastack-network

  # Base de Datos (PostgreSQL 17)
  db:
    image: postgres:17-alpine
    container_name: larastack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-larastack}
      POSTGRES_USER: ${DB_USERNAME:-larastack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - larastack-network

  # Cache y Colas (Redis)
  redis:
    image: redis:alpine
    container_name: larastack_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - larastack-network

  # Queue Worker (Proceso en segundo plano del API)
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: larastack_worker
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - redis
      - db
      - app
    networks:
      - larastack-network

  # Scheduler (Cron jobs de Laravel)
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: larastack_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      - redis
      - db
      - app
    networks:
      - larastack-network

networks:
  larastack-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
